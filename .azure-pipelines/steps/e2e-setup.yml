# Shared setup steps for all E2E test jobs.
# Handles: Node install, Key Vault secret fetch, cert file write, Rush install,
# Playwright browser install, and authentication state creation.

parameters:
  - name: nodeVersion
    type: string
    default: '20.x'
  - name: keyVaultServiceConnection
    type: string
  - name: keyVaultName
    type: string
  - name: testEnvironment
    type: string
    default: dev
  - name: authenticateMDA
    type: boolean
    default: false

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: 'Use Node.js ${{ parameters.nodeVersion }}'
    inputs:
      versionSpec: ${{ parameters.nodeVersion }}

  - script: |
      corepack enable
      corepack prepare pnpm@10.28.1 --activate
    displayName: Enable corepack + pnpm

  - script: npm install -g @microsoft/rush
    displayName: Install Rush

  # ── Fetch secrets from Key Vault ──────────────────────────────────────────
  # Secrets fetched:
  #   msAuthEmail                — test account email (e.g. testuser@contoso.com)
  #   msAuthCertificateBase64    — base64-encoded PFX certificate for CI auth
  #   msAuthCertificatePassword  — password for the PFX certificate
  #   powerAppsBaseUrl           — https://make.powerapps.com (or preview)
  #   powerAppsEnvironmentId     — environment GUID
  #   makerPortalUrl             — optional maker portal override
  #   modelDrivenAppUrl          — full MDA URL including ?appid=
  #   canvasAppId                — canvas app GUID
  #   canvasAppTenantId          — Azure AD tenant GUID
  # ─────────────────────────────────────────────────────────────────────────
  - task: AzureKeyVault@2
    displayName: Fetch secrets from Key Vault
    inputs:
      azureSubscription: '${{ parameters.keyVaultServiceConnection }}'
      KeyVaultName: '${{ parameters.keyVaultName }}'
      SecretsFilter: >-
        msAuthEmail,
        msAuthCertificateBase64,
        msAuthCertificatePassword,
        powerAppsBaseUrl,
        powerAppsEnvironmentId,
        makerPortalUrl,
        modelDrivenAppUrl,
        canvasAppId,
        canvasAppTenantId

  # Write certificate PFX from base64 secret to a temp file on the agent.
  # The file path is passed to Playwright via MS_AUTH_LOCAL_FILE_PATH.
  - script: |
      set -euo pipefail
      echo "$(msAuthCertificateBase64)" | base64 --decode > "$(Agent.TempDirectory)/auth-cert.pfx"
      echo "Certificate written to $(Agent.TempDirectory)/auth-cert.pfx"
    displayName: Write auth certificate to temp file

  - script: node common/scripts/install-run-rush.js install
    displayName: Rush Install

  - script: node common/scripts/install-run-rush.js build --to power-platform-playwright-toolkit
    displayName: Rush Build (toolkit only)

  # Install Playwright browsers — msedge channel is used in playwright.config.ts
  - script: |
      cd packages/e2e-tests
      npx playwright install msedge --with-deps
    displayName: Install Playwright browsers (msedge)

  # Create canvas / maker-portal auth state (used by gen-ux and canvas jobs).
  - script: |
      cd packages/e2e-tests
      npx tsx scripts/authenticate.ts
    displayName: Authenticate — canvas / maker portal
    env:
      CI: true
      MS_AUTH_EMAIL: $(msAuthEmail)
      MS_AUTH_CREDENTIAL_TYPE: certificate
      MS_AUTH_CREDENTIAL_PROVIDER: local-file
      MS_AUTH_LOCAL_FILE_PATH: $(Agent.TempDirectory)/auth-cert.pfx
      MS_AUTH_CERTIFICATE_PASSWORD: $(msAuthCertificatePassword)
      MS_AUTH_HEADLESS: true
      POWER_APPS_BASE_URL: $(powerAppsBaseUrl)
      AUTH_ENDPOINT: https://login.microsoftonline.com

  # Create MDA auth state — only runs for the NorthwindMDA job.
  - ${{ if eq(parameters.authenticateMDA, true) }}:
      - script: |
          cd packages/e2e-tests
          npx tsx scripts/authenticate.ts --mda
        displayName: Authenticate — Model-Driven App
        env:
          CI: true
          MS_AUTH_EMAIL: $(msAuthEmail)
          MS_AUTH_CREDENTIAL_TYPE: certificate
          MS_AUTH_CREDENTIAL_PROVIDER: local-file
          MS_AUTH_LOCAL_FILE_PATH: $(Agent.TempDirectory)/auth-cert.pfx
          MS_AUTH_CERTIFICATE_PASSWORD: $(msAuthCertificatePassword)
          MS_AUTH_HEADLESS: true
          POWER_APPS_BASE_URL: $(powerAppsBaseUrl)
          MODEL_DRIVEN_APP_URL: $(modelDrivenAppUrl)
          AUTH_ENDPOINT: https://login.microsoftonline.com
